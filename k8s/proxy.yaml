apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
        - name: proxy
          image: udp-lb-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9000
              protocol: UDP
          env:
            - name: PROXY_UDP_PORT
              value: "9000"
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
spec:
  selector:
    app: proxy
  ports:
    - name: tcp
      port: 8080
      targetPort: 8080
    - name: heartbeat
      port: 9000
      targetPort: 9000
      protocol: UDP
